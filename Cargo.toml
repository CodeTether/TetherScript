[package]
name = "tetherscript"
version = "1.0.0"
edition = "2021"
description = "A dynamically-typed scripting language with Rust-style ownership, implemented as a bytecode VM in Rust"
license = "MIT OR Apache-2.0"

[dependencies]

[lib]
name = "tetherscript"
path = "src/lib.rs"

[[bin]]
name = "tetherscript"
path = "src/main.rs"
